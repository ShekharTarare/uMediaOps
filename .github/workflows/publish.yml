name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/uMediaOps/uMediaOps.csproj

      - name: Build
        run: dotnet build src/uMediaOps/uMediaOps.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/uMediaOps/uMediaOps.csproj --configuration Release --no-build --output ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload package to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
